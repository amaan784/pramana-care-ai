bundle:
  name: pramana

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog where Pramana lives. Free Edition uses 'workspace'.
    default: workspace
  schema:
    description: UC schema.
    default: pramana
  warehouse_id:
    description: Serverless SQL warehouse used by Genie + the App.
    default: ""
  genie_space_id:
    description: Genie space id (created manually in notebook 07).
    default: ""
  serving_endpoint_name:
    description: Name of the deployed agent endpoint.
    default: pramana-agent

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${workspace.host}
    run_as:
      user_name: ${workspace.current_user.userName}

  prod:
    mode: production
    workspace:
      host: ${workspace.host}
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}
