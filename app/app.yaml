command: ["streamlit", "run", "app.py"]

env:
  - name: SERVING_ENDPOINT_NAME
    valueFrom: pramana-serving-endpoint
  - name: GENIE_SPACE_ID
    valueFrom: pramana-genie-space
  - name: WAREHOUSE_ID
    valueFrom: pramana-sql-warehouse
  - name: PRAMANA_CATALOG
    value: workspace
  - name: PRAMANA_SCHEMA
    value: pramana
